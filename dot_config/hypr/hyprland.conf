monitor=,preferred,auto,1

render {
  new_render_scheduling = true
}

input {
  numlock_by_default = true
  accel_profile = adaptive
  sensitivity = 0.0
  touchpad {
    natural_scroll = yes
  }
  # kb_options = caps:swapescape
}

gesture = 3, horizontal, workspace

#  █████╗ ███████╗████████╗██╗  ██╗███████╗████████╗██╗ ██████╗███████╗
