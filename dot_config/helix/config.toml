theme = "custom"

[editor]
line-number = "relative"
mouse = false
color-modes = true
bufferline = "multiple"
popup-border = "all"
lsp.display-inlay-hints = true
cursorline = true
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = ["file-type"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending"]
separator = "│"

[editor.file-picker]
hidden = false

[editor.inline-diagnostics]
cursor-line = "warning"

[keys.insert]
"C-[" = "normal_mode"

[keys.normal]
"ret" = "goto_word"
